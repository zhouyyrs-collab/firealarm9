<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Fire Alarm Monitoring — Map Demo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --bg: #0d1421;
    --panel: #161f2e;
    --line: #26334a;
    --text: #e6edf5;
    --muted: #8595ab;
    --critical: #e63946;
    --warning: #f4a533;
    --normal: #2e86de;
    --ok: #2bb673;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: "Segoe UI", -apple-system, system-ui, sans-serif; color: var(--text); }
  body { display: flex; flex-direction: column; background: var(--bg); }

  header {
    background: var(--panel); border-bottom: 1px solid var(--line);
    padding: 14px 22px; display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; z-index: 1000;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .pulse {
    width: 12px; height: 12px; border-radius: 50%; background: var(--critical);
    box-shadow: 0 0 0 rgba(230,57,70,0.6); animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(230,57,70,0.6); }
    70% { box-shadow: 0 0 0 12px rgba(230,57,70,0); }
    100% { box-shadow: 0 0 0 0 rgba(230,57,70,0); }
  }
  .brand h1 { font-size: 18px; font-weight: 700; }
  .brand span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; display: block; }
  .legend { display: flex; gap: 18px; font-size: 12.5px; flex-wrap: wrap; }
  .legend i { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .lc { background: var(--critical); } .lw { background: var(--warning); }
  .ln { background: var(--normal); } .lo { background: var(--ok); }

  .filters {
    background: var(--panel); border-bottom: 1px solid var(--line);
    padding: 10px 22px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .filters select, .filters input {
    background: var(--bg); border: 1px solid var(--line); color: var(--text);
    padding: 7px 11px; border-radius: 7px; font-size: 13px; outline: none;
  }
  .filters input { flex: 1; min-width: 140px; }
  .filters label { font-size: 12px; color: var(--muted); }

  .layout { flex: 1; display: flex; min-height: 0; }
  #map { flex: 1; min-height: 0; background: #0d1421; }

  .sidebar { width: 300px; background: var(--panel); border-left: 1px solid var(--line); overflow-y: auto; padding: 16px; }
  .stat-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat {
    flex: 1; background: var(--bg); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px; text-align: center;
  }
  .stat .num { font-size: 24px; font-weight: 700; }
  .stat .lbl { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .stat.c .num { color: var(--critical); } .stat.w .num { color: var(--warning); }
  .stat.n .num { color: var(--normal); }
  .sidebar h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin: 8px 0 12px; }
  .alarm-item {
    border: 1px solid var(--line); border-left-width: 4px; border-radius: 8px;
    padding: 11px 13px; margin-bottom: 9px; cursor: pointer; transition: all 0.15s; background: var(--bg);
  }
  .alarm-item:hover { border-color: var(--muted); transform: translateX(2px); }
  .alarm-item.critical { border-left-color: var(--critical); }
  .alarm-item.warning { border-left-color: var(--warning); }
  .alarm-item.normal { border-left-color: var(--normal); }
  .alarm-item .b-name { font-weight: 600; font-size: 13.5px; }
  .alarm-item .b-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 12px; margin-top: 6px; }
  .badge.critical { background: rgba(230,57,70,0.18); color: var(--critical); }
  .badge.warning { background: rgba(244,165,51,0.18); color: var(--warning); }
  .badge.normal { background: rgba(46,134,222,0.18); color: var(--normal); }

  /* Cluster bubbles */
  .cluster-bubble {
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; color: #fff; font-weight: 700; font-size: 13px;
    border: 3px solid rgba(255,255,255,0.85); box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  /* Popup */
  .leaflet-popup-content-wrapper { background: var(--panel); color: var(--text); border-radius: 10px; }
  .leaflet-popup-tip { background: var(--panel); }
  .leaflet-popup-content { margin: 14px 16px; width: 230px !important; }
  .pop-name { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .pop-row { font-size: 12.5px; color: var(--muted); margin: 4px 0; }
  .pop-row b { color: var(--text); font-weight: 600; }
  .pop-status { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 3px 10px; border-radius: 12px; margin-top: 8px; }

  @media (max-width: 820px) { .sidebar { display: none; } .legend { font-size: 11px; gap: 12px; } }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="pulse"></div>
    <div>
      <h1>Live Fire Alarm Monitoring</h1>
      <span>Real-time Building Alarm Dashboard</span>
    </div>
  </div>
  <div class="legend">
    <span><i class="lc"></i>Critical</span>
    <span><i class="lw"></i>Warning</span>
    <span><i class="ln"></i>Normal</span>
    <span><i class="lo"></i>Cleared</span>
  </div>
</header>

<div class="filters">
  <label>Status</label>
  <select id="f-status">
    <option value="all">All</option>
    <option value="critical">Critical</option>
    <option value="warning">Warning</option>
    <option value="normal">Normal</option>
  </select>
  <label>Type</label>
  <select id="f-type">
    <option value="all">All Types</option>
    <option value="Residential">Residential</option>
    <option value="Commercial">Commercial</option>
    <option value="Industrial">Industrial</option>
    <option value="Hospital">Hospital</option>
  </select>
  <input id="f-search" type="text" placeholder="Search building name or address..." />
</div>

<div class="layout">
  <div id="map"></div>
  <aside class="sidebar">
    <div class="stat-row">
      <div class="stat c"><div class="num" id="s-crit">0</div><div class="lbl">Critical</div></div>
      <div class="stat w"><div class="num" id="s-warn">0</div><div class="lbl">Warning</div></div>
      <div class="stat n"><div class="num" id="s-norm">0</div><div class="lbl">Normal</div></div>
    </div>
    <h2>Active Alarms</h2>
    <div id="alarm-list"></div>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Sample fire alarm data (demo) — Dubai area ──
const buildings = [
  { id:'B-1024', name:'Marina Heights Tower', type:'Residential', addr:'Dubai Marina', lat:25.0805, lng:55.1403, status:'critical', count:487, info:'Smoke detected — floors 18-22' },
  { id:'B-2087', name:'JBR Commercial Plaza', type:'Commercial', addr:'Jumeirah Beach Residence', lat:25.0758, lng:55.1340, status:'critical', count:603, info:'Multiple zone activation' },
  { id:'B-3391', name:'Al Sufouh Business Bay', type:'Commercial', addr:'Al Sufouh', lat:25.1012, lng:55.1620, status:'critical', count:268, info:'Sprinkler system engaged' },
  { id:'B-4410', name:'Palm Tower Complex', type:'Residential', addr:'Palm Jumeirah', lat:25.1124, lng:55.1389, status:'warning', count:110, info:'Heat sensor alert — lobby' },
  { id:'B-5523', name:'Knowledge Park Center', type:'Commercial', addr:'Dubai Knowledge Park', lat:25.1045, lng:55.1685, status:'warning', count:85, info:'Detector maintenance due' },
  { id:'B-6677', name:'Internet City Hub', type:'Industrial', addr:'Dubai Internet City', lat:25.0935, lng:55.1580, status:'warning', count:35, info:'Low battery — 3 detectors' },
  { id:'B-7780', name:'Media City Tower A', type:'Commercial', addr:'Dubai Media City', lat:25.0960, lng:55.1500, status:'normal', count:31, info:'All systems normal' },
  { id:'B-8891', name:'Barsha Residences', type:'Residential', addr:'Al Barsha', lat:25.1140, lng:55.2010, status:'critical', count:496, info:'Fire confirmed — evacuating' },
  { id:'B-9912', name:'Business Bay Central', type:'Commercial', addr:'Business Bay', lat:25.1850, lng:55.2620, status:'critical', count:487, info:'Alarm zone 4 active' },
  { id:'B-1135', name:'Emirates Hospital Wing', type:'Hospital', addr:'Jumeirah', lat:25.2010, lng:55.2380, status:'normal', count:8, info:'Routine test passed' },
  { id:'B-1246', name:'Downtown Loft Tower', type:'Residential', addr:'Downtown Dubai', lat:25.1920, lng:55.2750, status:'normal', count:6, info:'All clear' },
  { id:'B-1357', name:'DIFC Gate Building', type:'Commercial', addr:'DIFC', lat:25.2110, lng:55.2810, status:'normal', count:3, info:'Sensors operational' },
  { id:'B-1468', name:'Deira Industrial Unit', type:'Industrial', addr:'Deira', lat:25.2260, lng:55.3120, status:'warning', count:42, info:'Smoke threshold near limit' },
  { id:'B-1579', name:'Festival City Mall', type:'Commercial', addr:'Dubai Festival City', lat:25.2220, lng:55.3520, status:'normal', count:9, info:'Normal operation' },
];

const colors = { critical:'#e63946', warning:'#f4a533', normal:'#2e86de', cleared:'#2bb673' };

const map = L.map('map', { zoomControl: true }).setView([25.13, 55.23], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap, © CARTO', maxZoom: 19
}).addTo(map);

let markers = {};

function bubbleSize(count) {
  if (count >= 400) return 56;
  if (count >= 200) return 48;
  if (count >= 100) return 42;
  if (count >= 40) return 36;
  if (count >= 10) return 30;
  return 26;
}

function makeIcon(b) {
  const size = bubbleSize(b.count);
  return L.divIcon({
    className: '',
    html: `<div class="cluster-bubble" style="width:${size}px;height:${size}px;background:${colors[b.status]}">${b.count}</div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

function popupHtml(b) {
  return `
    <div class="pop-name">${b.name}</div>
    <div class="pop-row"><b>ID:</b> ${b.id}</div>
    <div class="pop-row"><b>Location:</b> ${b.addr}</div>
    <div class="pop-row"><b>Type:</b> ${b.type}</div>
    <div class="pop-row"><b>Active alarms:</b> ${b.count}</div>
    <div class="pop-row">${b.info}</div>
    <span class="pop-status" style="background:${colors[b.status]}33;color:${colors[b.status]}">${b.status}</span>`;
}

function render() {
  const fStatus = document.getElementById('f-status').value;
  const fType = document.getElementById('f-type').value;
  const fSearch = document.getElementById('f-search').value.toLowerCase();

  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  let crit = 0, warn = 0, norm = 0;
  const listEl = document.getElementById('alarm-list');
  listEl.innerHTML = '';

  const filtered = buildings.filter(b => {
    if (fStatus !== 'all' && b.status !== fStatus) return false;
    if (fType !== 'all' && b.type !== fType) return false;
    if (fSearch && !(b.name.toLowerCase().includes(fSearch) || b.addr.toLowerCase().includes(fSearch))) return false;
    return true;
  });

  filtered.forEach(b => {
    const m = L.marker([b.lat, b.lng], { icon: makeIcon(b) }).addTo(map);
    m.bindPopup(popupHtml(b));
    markers[b.id] = m;

    if (b.status === 'critical') crit++;
    else if (b.status === 'warning') warn++;
    else norm++;

    const item = document.createElement('div');
    item.className = `alarm-item ${b.status}`;
    item.innerHTML = `
      <div class="b-name">${b.name}</div>
      <div class="b-meta">${b.id} · ${b.addr} · ${b.count} alarms</div>
      <span class="badge ${b.status}">${b.status}</span>`;
    item.onclick = () => { map.setView([b.lat, b.lng], 14, { animate:true }); markers[b.id].openPopup(); };
    listEl.appendChild(item);
  });

  document.getElementById('s-crit').textContent = crit;
  document.getElementById('s-warn').textContent = warn;
  document.getElementById('s-norm').textContent = norm;
}

document.getElementById('f-status').onchange = render;
document.getElementById('f-type').onchange = render;
document.getElementById('f-search').oninput = render;

render();

// Simulate live updates — counts fluctuate slightly
setInterval(() => {
  buildings.forEach(b => {
    if (b.status === 'critical' || b.status === 'warning') {
      const delta = Math.floor(Math.random() * 7) - 3;
      b.count = Math.max(1, b.count + delta);
    }
  });
  render();
}, 4000);
</script>
</body>
</html>
